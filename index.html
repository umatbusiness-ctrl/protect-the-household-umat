    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .neon { text-shadow: 0 0 15px #00f7ff, 0 0 30px #00f7ff; }
        .tilt { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .tilt:hover { transform: perspective(1000px) rotateX(8deg) rotateY(8deg) scale(1.03); }
        .fade-in { opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-black text-white">

    <nav class="bg-black/90 backdrop-blur-xl sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <div class="flex items-center gap-4">

            </div>
            <div class="flex items-center gap-10 text-sm font-medium uppercase tracking-widest">
                <a href="index.html" class="text-cyan-400 font-semibold">Home</a>

        </div>
    </nav>

    <header class="min-h-screen flex items-center justify-center text-center px-8">
        <div>
            <h1 class="text-6xl font-black tracking-[-2px] neon">PROTECT THE HOUSEHOLD</h1>
            <p class="text-2xl text-zinc-400 mt-8 max-w-xl mx-auto">Cybersecurity Awareness for Families in Tarkwa</p>
            <div class="flex justify-center gap-6 mt-16">
                <a href="activities.html" class="px-10 py-5 bg-white text-black font-bold text-lg rounded-3xl hover:bg-cyan-400 hover:text-black transition">See What We Did</a>
                <a href="tips.html" class="px-10 py-5 border-2 border-cyan-400 text-cyan-400 font-bold text-lg rounded-3xl hover:bg-cyan-400 hover:text-black transition">Safety Tips</a>

        <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="tilt bg-zinc-900/80 p-8 rounded-3xl text-center fade-in">
                <i class="fas fa-router text-5xl text-cyan-400 mb-6"></i>
                <h3 class="text-2xl font-bold">Smart Home Risks</h3>
            </div>
            <div class="tilt bg-zinc-900/80 p-8 rounded-3xl text-center fade-in">
                <i class="fas fa-gamepad text-5xl text-cyan-400 mb-6"></i>
                <h3 class="text-2xl font-bold">Gaming Exploitation</h3>
            </div>
            <div class="tilt bg-zinc-900/80 p-8 rounded-3xl text-center fade-in">

                <h3 class="text-2xl font-bold">AI Threats</h3>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.fade-in').forEach(el => {
            const observer = new IntersectionObserver(e => e.forEach(entry => entry.isIntersecting && el.classList.add('visible')));
            observer.observe(el);
        });
    </script>
