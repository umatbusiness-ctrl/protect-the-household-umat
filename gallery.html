<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Protect the Household</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .neon { text-shadow: 0 0 30px #00f7ff, 0 0 60px #00f7ff; }
        .tilt { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .tilt:hover { transform: perspective(1200px) rotateX(12deg) rotateY(12deg) scale(1.05); }
        .fade-in { opacity: 0; transform: translateY(40px); transition: all 1s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-black text-white">

    <nav class="bg-black/90 backdrop-blur-xl sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <i class="fas fa-shield-alt text-5xl text-cyan-400"></i>
                <h1 class="text-3xl font-black tracking-[-2px] neon">PROTECT THE HOUSEHOLD</h1>
            </div>
            <div class="flex items-center gap-10 text-sm font-medium uppercase tracking-widest">
                <a href="index.html" class="hover:text-cyan-400 transition">Home</a>
                <a href="about.html" class="hover:text-cyan-400 transition">About</a>
                <a href="activities.html" class="hover:text-cyan-400 transition">Activities</a>
                <a href="tips.html" class="hover:text-cyan-400 transition">Safety Tips</a>
                <a href="gallery.html" class="text-cyan-400 font-semibold">Gallery</a>
                <a href="contact.html" class="hover:text-cyan-400 transition">Contact</a>
            </div>
            <a href="https://umat.edu.gh" target="_blank" class="px-8 py-3 bg-white text-black font-bold rounded-2xl hover:bg-cyan-400 hover:text-black transition">UMaT CY381</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-8 py-32">
        <h1 class="text-[90px] leading-none font-black tracking-[-6px] neon text-center mb-20">GALLERY</h1>
        
        <div class="grid grid-cols-2 md:grid-cols-3 gap-8">
            <!-- Replace these placeholder URLs with your real event photos -->
            <div class="tilt overflow-hidden rounded-3xl fade-in">
                <img src="https://picsum.photos/id/1015/800/600" alt="Walk-through" class="w-full h-full object-cover">
            </div>
            <div class="tilt overflow-hidden rounded-3xl fade-in">
                <img src="https://picsum.photos/id/201/800/600" alt="Family Breakfast" class="w-full h-full object-cover">
            </div>
            <div class="tilt overflow-hidden rounded-3xl fade-in">
                <img src="https://picsum.photos/id/301/800/600" alt="Live Demo" class="w-full h-full object-cover">
            </div>
            <div class="tilt overflow-hidden rounded-3xl fade-in">
                <img src="https://picsum.photos/id/401/800/600" alt="Roving Table" class="w-full h-full object-cover">
            </div>
            <div class="tilt overflow-hidden rounded-3xl fade-in">
                <img src="https://picsum.photos/id/501/800/600" alt="Simulation" class="w-full h-full object-cover">
            </div>
            <div class="tilt overflow-hidden rounded-3xl fade-in">
                <img src="https://picsum.photos/id/601/800/600" alt="Team" class="w-full h-full object-cover">
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.fade-in').forEach(el => {
            const observer = new IntersectionObserver(e => e.forEach(entry => entry.isIntersecting && el.classList.add('visible')));
            observer.observe(el);
        });
    </script>
</body>
</html>
